<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мудрый... Кристаллов</title>
    <style>
        body { background: #090d16; color: #f8fafc; font-family: Arial, sans-serif; text-align: center; padding: 0; margin: 0; user-select: none; }
        .screen { display: none; padding: 25px; max-width: 650px; margin: 20px auto; border-radius: 20px; box-shadow: 0 0 35px rgba(0,0,0,0.7); }
        .active { display: block; }
        #screen-intro { background: #111c24; border: 3px solid #10b981; }
        #screen-menu { background: #1e1e38; border: 3px solid #6366f1; }
        #screen-game { background: #18181b; border: 3px solid #f97316; }
        #screen-map { background: #1c1917; border: 3px solid #f97316; }
        #screen-shop { background: #2e1f1f; border: 3px solid #f43f5e; }
        #screen-inventory { background: #1f2e3d; border: 3px solid #0ea5e9; }
        #screen-admin { background: #4c1d95; border: 3px solid #a855f7; position: relative; }
        #screen-promo { background: #1e293b; border: 3px solid #3b82f6; }
        #screen-wheel { background: #1e1b4b; border: 3px solid #a855f7; }
        .btn { color: white; border: none; padding: 14px 24px; margin: 12px auto; cursor: pointer; border-radius: 12px; font-size: 18px; font-weight: bold; width: 90%; display: block; }
        .btn-play { background: #10b981; }
        .btn-shop { background: #f43f5e; }
        .btn-inv { background: #0ea5e9; }
        .btn-wheel { background: #ec4899; }
        .btn-back { background: #64748b; width: auto; display: inline-block; padding: 10px 25px; }
        .btn-nav { padding: 6px 14px; background: #334155; border: 1px solid #475569; color: white; cursor: pointer; border-radius: 8px; }
        .header-buttons { display: flex; justify-content: space-between; max-width: 650px; margin: 10px auto; padding: 0 10px; }
        .stats-bar { display: flex; justify-content: space-around; background: rgba(15,23,42,0.6); padding: 12px; border-radius: 12px; font-weight: bold; margin-bottom: 20px; }
        .skins-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        .skin-card { background: rgba(51,65,85,0.4); padding: 15px; border-radius: 14px; border: 2px solid #475569; display: flex; flex-direction: column; align-items: center; justify-content: space-between; }
        #mapCanvas, #gameCanvas { border: 4px solid #3f3f46; border-radius: 14px; display: block; margin: 0 auto; background: #52525b; }
        .world-switch-container { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .world-btn { background: #334155; border: 1px solid #475569; color: white; padding: 8px; border-radius: 8px; cursor: pointer; font-size: 12px; }
        .world-btn.active-w { background: #f97316; }
        .skin-art { font-size: 50px; margin-bottom: 10px; width: 80px; height: 80px; background: rgba(0,0,0,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div class="header-buttons">
        <button class="btn-nav" onclick="openPromoScreen()">🔑 Коды</button>
        <button class="btn-nav" id="admin-panel-btn" onclick="goToAdminScreen()" style="display:none; background:#7c3aed;">🔮 Панель Ивентов</button>
        <button class="btn-nav" onclick="alert('ТГ Канал создателя: t.me/runner231')">⚙️ Инфо</button>
    </div>

    <div id="screen-intro" class="screen active">
        <div style="font-size:80px; margin:15px 0;">🌳</div>
        <h2>Мудрый Дуб</h2>
        <input type="text" id="player-nickname-input" placeholder="Введите ваш никнейм..." style="padding: 12px; border-radius: 10px; width: 75%; font-size: 16px; border: 2px solid #10b981; background: #0f172a; color: white; text-align: center;"><br><br>
        <button class="btn btn-play" onclick="submitNicknameAndStart()">Ввести никнейм и войти ➔</button>
    </div>

    <div id="screen-menu" class="screen">
        <div style="text-align: left; color: #38bdf8; font-weight: bold; margin-bottom: 10px;">👤 Админ: [<span id="display-player-name">Загрузка...</span>]</div>
        <h1>Главное Меню</h1>
        <div class="stats-bar">
            <div style="color:#eab308;">💰: <span id="m-coins">0</span></div>
            <div style="color:#0ea5e9;">💎: <span id="m-crystals">0</span></div>
            <div style="color:#a855f7;">⭐ Сюжет: <span id="m-level">0</span> / 100</div>
        </div>
        <button class="btn btn-play" onclick="clickPlayButton()">🎮 ИГРАТЬ (КАРТА МИРОВ)</button>
        <button class="btn btn-wheel" onclick="openWheelScreen()">🎰 КОЛЕСО ФОРТУНЫ</button>
        <button class="btn btn-shop" onclick="openShop()">🛒 МАГАЗИН ПЕРСОНАЖЕЙ</button>
        <button class="btn btn-inv" onclick="openInventory()">🎒 ИНВЕНТАРЬ</button>
    </div>

    <div id="screen-wheel" class="screen">
        <h1>🎰 КОЛЕСО ФОРТУНЫ</h1>
        <div class="stats-bar">💰 Монеты: <span id="wheel-coins">0</span></div>
        <button class="btn btn-wheel" onclick="spinWheel()">КРУТИТЬ ЗА 250💰</button>
        <button class="btn btn-back" onclick="backToMenu()">Назад</button>
    </div>

    <div id="screen-map" class="screen">
        <h2>🗺️ КАРТА ИГРОВЫХ МИРОВ</h2>
        <div class="world-switch-container">
            <button class="world-btn active-w" id="w1-btn" onclick="switchMapWorld(1)">Мир 1</button>
            <button class="world-btn" id="w2-btn" onclick="switchMapWorld(2)">Мир 2 🪵</button>
            <button class="world-btn" id="w3-btn" onclick="switchMapWorld(3)">Мир 3 🟨</button>
            <button class="world-btn" id="w4-btn" onclick="switchMapWorld(4)">Мир 4 🌊</button>
            <button class="world-btn" id="w5-btn" onclick="switchMapWorld(5)">Мир 5 🪲</button>
            <button class="world-btn" id="w6-btn" onclick="switchMapWorld(6)" style="display:none; background:#10b981;">🌾 ФАРМ</button>
        </div>
        <canvas id="mapCanvas" width="600" height="270"></canvas>
        <button class="btn btn-back" onclick="backToMenu()">В меню</button>
    </div>

    <div id="screen-shop" class="screen">
        <h1>🛒 Магазин</h1>
        <div class="stats-bar">💰 Монеты: <span id="shop-coins">0</span></div>
        <div class="skins-grid" id="shop-content-container"></div>
        <button class="btn btn-back" onclick="backToMenu()">Назад</button>
    </div>

    <div id="screen-inventory" class="screen">
        <h1>🎒 Гардероб</h1>
        <div class="skins-grid" id="inventory-container"></div>
        <button class="btn btn-back" onclick="backToMenu()">Назад</button>
    </div>

    <div id="screen-admin" class="screen">
        <div onclick="backToMenu()" style="position: absolute; top: 15px; right: 20px; font-size: 24px; cursor: pointer; color: #ef4444; font-weight: bold;">❌</div>
        <h1>🔮 ПАНЕЛЬ УПРАВЛЕНИЯ</h1>
        <input type="number" id="admin-coin-amount" placeholder="Количество монет" style="padding: 8px; margin-bottom: 10px; border-radius: 8px;"><br>
        <button class="btn-nav" onclick="adminGiveCoins()">Выдать Деньги 💰</button><br><br>
        <button class="btn" style="background: #059669;" onclick="triggerGlobalAdminEvent('speed')">⚡ ИВЕНТ 1: 2Х СКОРОСТЬ</button>
        <button class="btn" style="background: #eab308;" onclick="triggerGlobalAdminEvent('gold_rush')">💰 ИВЕНТ 2: 2Х ДЕНЕГ</button>
        <button class="btn" style="background: #0284c7;" onclick="triggerGlobalAdminEvent('rain_revive')">☔ ИВЕНТ 3: ДОЖДЬ ВОЗРОЖДЕНИЯ</button>
        <button class="btn" style="background: #ef4444;" onclick="triggerGlobalAdminEvent('stop')">🛑 ОСТАНОВИТЬ ВСЕ ИВЕНТЫ</button>
    </div>

    <div id="screen-promo" class="screen">
        <h2>🔑 Введите Код</h2>
        <input type="text" id="promo-input" style="padding:10px; border-radius:8px; width:60%; font-size:16px;"><br><br>
        <button class="btn btn-play" onclick="checkPromoCode()">Активировать</button>
        <p id="promo-res"></p>
        <button class="btn btn-back" onclick="backToMenu()">Назад</button>
    </div>

    <div class="screen" id="screen-game">
        <div style="display:flex; justify-content:space-between; margin-bottom:12px; font-weight:bold;">
            <div style="color:#a855f7;" id="g-world-title">🏙️ МИР 1</div>
            <div style="color:#f97316;">🧱 Пройдено: <span id="g-buildings">0</span></div>
            <div style="color:#0ea5e9;">💎 Собрано: <span id="g-crystals">0</span></div>
        </div>
        <canvas id="gameCanvas" width="600" height="270"></canvas>
        <div style="margin-top: 15px;">
            <button class="btn-nav" onclick="moveUp()" style="padding: 15px 30px; font-size: 18px; margin-right: 10px;">▲ ВВЕРХ</button>
            <button class="btn-nav" onclick="moveDown()" style="padding: 15px 30px; font-size: 18px;">▼ ВНИЗ</button>
        </div>
        <button class="btn btn-back" onclick="exitGameToMap()" style="width:40%;">К карте</button>
    </div>

<script>
    let coins = 0; let crystals = 0; let selectedLevelToPlay = 1;
    let currentMapWorld = 1; let isFarmWorldActive = false;
    let globalActiveEvent = "none"; let isAdminVerified = false; let playerNickname = "";

    const lanes = new Array(45, 135, 225); 
    let playerLane = 1; let playerX = 60; let buildingsPassed = 0;
    let gameActive = false; let obstacles = []; let gameCrystals = []; let spawnTimer = 0;
    let extraLivesCount = 0; let drops = [];

    let bossActive = false; let bossMode = 'charging'; let bossTimer = 0; let bossX = 500;
    let warningLane = 0; let gorillaAttackCount = 0;

    const canvas = document.getElementById('gameCanvas'); const ctx = canvas.getContext('2d');
    const mapCanvas = document.getElementById('mapCanvas'); const mctx = mapCanvas.getContext('2d');

    let finishedLevels = Array(100).fill(false);
    
    const skins = [
        { id: 0, name: "Лягушка", art: "🐸", cost: 0, owned: true },
